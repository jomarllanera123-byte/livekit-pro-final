<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | Ochoa Live</title><link rel="stylesheet" href="/css/style.css"><script src="/socket.io/socket.io.js"></script></head><body><div class="app"><header class="topbar"><div class="brand">OCHOA <span>LIVE</span></div><div class="top-actions"><span id="liveBadge" class="badge off">OFFLINE</span><span>👥 <b id="viewerCount">0</b></span><span id="liveTimer">00:00:00</span><a href="/logout">Salir</a></div></header><main class="layout"><section class="studio"><div class="stage"><video id="screenVideo" autoplay muted playsinline></video><video id="cameraVideo" autoplay muted playsinline class="pip"></video><div id="emptyState" class="empty">Presiona “Iniciar Live” para transmitir</div></div><div class="controls"><button id="startBtn" class="btn primary">🚀 Iniciar Live</button><button id="stopBtn" class="btn danger">⏹ Detener</button><button id="screenBtn" class="btn">🖥 Cambiar pantalla</button><button id="camBtn" class="btn">📷 Cámara</button><button id="micBtn" class="btn">🎤 Mic</button></div><div class="panel"><label>Calidad<select id="qualitySelect"><option value="720p">720p HD</option><option value="1080p" selected>1080p Full HD</option><option value="1440p">1440p 2K</option><option value="2160p">2160p 4K</option></select></label><label>FPS<select id="fpsSelect"><option value="30" selected>30 FPS</option><option value="60">60 FPS</option></select></label><label>Bitrate<select id="bitrateSelect"><option value="auto" selected>Automático</option><option value="2500000">2.5 Mbps</option><option value="5000000">5 Mbps</option><option value="8000000">8 Mbps</option><option value="12000000">12 Mbps</option><option value="20000000">20 Mbps</option></select></label><p id="status">Listo.</p></div></section><aside class="chat"><h3>Chat en vivo</h3><div id="chatMessages"></div><form id="chatForm"><input id="chatInput" placeholder="Escribe un mensaje"><button>Enviar</button></form></aside></main></div><script type="module" src="/js/admin.js"></script></body></html>
